<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clearing cache… — Klima.Al</title>
  <meta name="robots" content="noindex" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px 20px; max-width: 480px; margin: 0 auto; color: #141f2e; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    p { line-height: 1.6; color: #6b7280; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: .9em; }
    ul li { margin-bottom: 6px; color: #16a34a; font-family: ui-monospace, monospace; font-size: .85rem; }
    .err { color: #b91c1c; }
    a.btn { display: inline-block; margin-top: 18px; padding: 10px 18px; background: #9b1b2e; color: #fff; border-radius: 6px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <h1>🧹 Po pastrohet cache…</h1>
  <p>Po fshihen të gjithë service workers + cache për këtë origjinë.</p>
  <ul id="log"></ul>
  <p id="done" style="display:none">
    U bë. <a href="/" class="btn">Hap faqen e re</a>
  </p>

<script>
const log = document.getElementById('log');
const done = document.getElementById('done');
function add(msg, ok = true) {
  const li = document.createElement('li');
  li.textContent = (ok ? '✓ ' : '✗ ') + msg;
  if (!ok) li.className = 'err';
  log.appendChild(li);
}

(async () => {
  // 1. Unregister all service workers for this origin
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      add(`Found ${regs.length} service worker(s)`);
      for (const r of regs) {
        await r.unregister();
        add(`Unregistered: ${r.scope}`);
      }
    } catch (e) { add('SW unregister failed: ' + e.message, false); }
  } else {
    add('No serviceWorker API in this browser');
  }

  // 2. Delete every cache via the Cache API
  if ('caches' in window) {
    try {
      const keys = await caches.keys();
      add(`Found ${keys.length} cache(s)`);
      for (const k of keys) {
        await caches.delete(k);
        add(`Deleted cache: ${k}`);
      }
    } catch (e) { add('Cache deletion failed: ' + e.message, false); }
  }

  // 3. localStorage + sessionStorage cleared (cart, favorites etc.)
  try {
    localStorage.clear();
    sessionStorage.clear();
    add('Cleared localStorage + sessionStorage');
  } catch (e) { add('Storage clear failed: ' + e.message, false); }

  done.style.display = 'block';
  // Auto-redirect in 2 seconds
  setTimeout(() => { location.href = '/?fresh=' + Date.now(); }, 2000);
})();
</script>
</body>
</html>
